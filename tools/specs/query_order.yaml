# 工具规范示例 2/3：HTTP API 工具
# 用法：AI 调 query_order(order_id="ORD123")，GET 内部订单 API
# 密钥走环境变量 ORDER_API_KEY（Bearer），不写进配置
name: query_order
description: 根据订单号查询订单状态（内部订单系统 API）
input_schema:
  type: object
  properties:
    order_id:
      type: string
      description: 订单号
  required: [order_id]
handler:
  type: http
  method: GET
  url: "https://api.example.com/orders/{order_id}"
  auth_env: ORDER_API_KEY        # 运行时读这个环境变量作 Bearer token
  timeout: 10
permission: read_only
domain: sales
