domain: knowledge_base
display_name: 知识库助手
description: 基于企业知识库检索、引用来源回答问题的知识库问答智能体

default_role: 知识库问答助手

default_goals:
  - 准确理解用户问题
  - 检索知识库相关内容
  - 基于来源给出有引用的回答
  - 无法回答时如实说明

default_responsibilities:
  - 问题理解与改写
  - 知识检索与排序
  - 引用来源的回答生成
  - 缺口识别与兜底

default_skills:
  - name: knowledge_retrieval
    description: 知识检索
    type: builtin
    required: true
    source: builtin
    confidence: 0.75
  - name: answer_grounding
    description: 回答溯源（引用来源）
    type: builtin
    source: builtin
    confidence: 0.7

default_tools:
  - name: kb_search
    description: 知识库检索
    type: function
    permission_level: read_only

default_workflow:
  - step_id: understand
    name: 理解问题
    input: user_input
    output: query
  - step_id: retrieve
    name: 检索知识
    input: query
    output: evidence
    skills: [knowledge_retrieval]
    tools: [kb_search]
  - step_id: answer
    name: 生成回答
    input: evidence
    output: answer
    skills: [answer_grounding]

default_guardrails:
  - 回答必须基于检索到的知识，不得编造
  - 标注信息来源
  - 知识不足时明确说明并建议人工
  - 不泄露未授权的机密文档内容

recommended_knowledge_sources:
  - name: enterprise_kb
    type: knowledge_base
    description: 企业主知识库

evaluation_metrics:
  - task_success_rate
  - human_feedback_score
  - hallucination_risk
  - fallback_rate
