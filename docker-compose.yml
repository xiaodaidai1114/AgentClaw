# AgentClaw 基础设施
# 运行 PostgreSQL + Redis + Milvus Standalone + Adminer，Agent 在宿主机运行
# 使用方式: agentclaw up 或 docker compose up -d

name: agentclaw

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: agentclaw
      POSTGRES_DB: agentclaw
    volumes:
      - type: ${AGENTCLAW_DOCKER_STORAGE_TYPE:-volume}
        source: ${AGENTCLAW_DOCKER_PGDATA_DIR:-pgdata}
        target: /var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - type: ${AGENTCLAW_DOCKER_STORAGE_TYPE:-volume}
        source: ${AGENTCLAW_DOCKER_REDISDATA_DIR:-redisdata}
        target: /data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - type: ${AGENTCLAW_DOCKER_STORAGE_TYPE:-volume}
        source: ${AGENTCLAW_DOCKER_ETCDDATA_DIR:-etcddata}
        target: /etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - type: ${AGENTCLAW_DOCKER_STORAGE_TYPE:-volume}
        source: ${AGENTCLAW_DOCKER_MINIODATA_DIR:-miniadata}
        target: /minio_data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.7
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - type: ${AGENTCLAW_DOCKER_STORAGE_TYPE:-volume}
        source: ${AGENTCLAW_DOCKER_MILVUSDATA_DIR:-milvusdata}
        target: /var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_HTTP_PORT:-9091}:9091"
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  etcddata:
  miniadata:
  milvusdata:
